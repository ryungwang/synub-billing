spring:
  application:
    name: synub-billing-api
  datasource:
    # 공용 로컬 Postgres(5432) — synub 프로젝트 DB들이 모여있는 기존 인스턴스. 전용 컨테이너 안 씀.
    url: jdbc:postgresql://localhost:5432/synub_billing
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:deer}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: billing
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    schemas: billing
    default-schema: billing
    create-schemas: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8088

app:
  cors:
    allowed-origins: "http://localhost:3100,http://localhost:3000"
  billing:
    # 결제 실패 후 재시도 간격(일). D+1, D+3, D+5 모두 실패하면 suspended.
    retry-days: [1, 3, 5]
  webhook:
    secret: "local-dev-webhook-secret"
    timeout-ms: 2000
    max-attempts: 3
  portone:
    # enabled=true 로 바꾸고 store-id/api-secret 채우면 실연동(포트원 V2 · 토스페이먼츠 테스트 채널)으로 전환.
    enabled: ${PORTONE_ENABLED:false}
    api-base: "https://api.portone.io"
    store-id: ${PORTONE_STORE_ID:}
    # 토스페이먼츠 채널(synub-toss). 이니시스에서 전환.
    channel-key: ${PORTONE_CHANNEL_KEY:channel-key-b52b5071-01d9-4e6a-a352-a273a8b2e596}
    api-secret: ${PORTONE_API_SECRET:}
    # 대표자 본인인증용 채널(별도). 없으면 본인인증 단계 생략(서류+관리자 심사로 대체).
    identity-channel-key: ${PORTONE_IDENTITY_CHANNEL_KEY:}
    # PG 웹훅 서명검증 시크릿(포트원 콘솔 whsec_...). 없으면 웹훅 거부(fail-closed).
    webhook-secret: ${PORTONE_WEBHOOK_SECRET:}
  internal:
    # /internal 운영 엔드포인트 보호. 운영은 반드시 강한 시크릿 주입.
    secret: ${INTERNAL_SECRET:local-internal-secret}
  entitlement:
    # 제품→빌링 entitlements 조회 서비스 키. 운영은 반드시 env 주입.
    api-key: ${SERVICE_API_KEY:local-service-key}
  business:
    # 국세청(공공데이터포털). api-key 없으면 형식·체크섬만 검증(로컬).
    status-api-url: ${BUSINESS_STATUS_API_URL:https://api.odcloud.kr/api/nts-businessman/v1/status}
    validate-api-url: ${BUSINESS_VALIDATE_API_URL:https://api.odcloud.kr/api/nts-businessman/v1/validate}
    api-key: ${BUSINESS_API_KEY:}
  storage:
    # 사업자등록증 등 업로드 파일 저장 경로(로컬). 운영은 S3 어댑터.
    dir: ${STORAGE_DIR:./data/uploads}
  mail:
    from: ${MAIL_FROM:no-reply@synub.io}
    app-base-url: ${APP_BASE_URL:http://localhost:3100}
    # 로컬은 false → 로그로 발송(SMTP 서버 불필요). 운영은 true + spring.mail(SES SMTP).
    smtp-enabled: ${MAIL_SMTP_ENABLED:false}
  sso:
    # 통합계정(SSO) 토큰 검증. mode=jwks(SSO 공개키, 기본) | hs256(공유키).
    # 로컬 SSO(apps/sso, 8090)가 JWKS를 제공 → 기본 jwks. SSO 미기동이어도 무토큰 요청은 dev-fallback으로 동작.
    mode: ${SSO_MODE:jwks}
    jwt-secret: ${SSO_JWT_SECRET:local-dev-sso-signing-secret-change-me-please-0123456789}
    jwks-uri: ${SSO_JWKS_URI:http://localhost:8090/.well-known/jwks.json}
    issuer: ${SSO_ISSUER:https://accounts.synub.io}
    audience: ${SSO_AUDIENCE:synub-billing}
    clock-skew-seconds: 60
    # 하드게이트: 토큰 없으면 401(로그인 필수). 데모는 SSO 데모 계정(demo@synub.io)으로 로그인해 체험.
    # (로컬에서 임시로 무로그인 데모를 켜려면 SSO_DEV_FALLBACK=true)
    dev-fallback-enabled: ${SSO_DEV_FALLBACK:false}
    dev-external-id: "demo-user"
    dev-email: "deerkrg@synub.io"

# 자동청구 스케줄러 cron (매일 03:00 KST). 분산 환경에선 ShedLock 도입 검토.
billing:
  scheduler:
    cron: "0 0 3 * * *"
    zone: "Asia/Seoul"
