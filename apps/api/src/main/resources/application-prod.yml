# prod 프로필 — 시크릿은 디폴트 금지(${ENV}), 공유 db의 앱 전용 DB+스키마.
spring:
  datasource:
    # env 이름은 Spring 표준(SPRING_DATASOURCE_*) — 공용 .env(sso/office와 공유)와 통일.
    # URL은 시크릿 아님 → 공용 postgres(compose 서비스 db)의 synub_billing 고정 기본값, 유저/비번만 .env.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/synub_billing}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      connection-init-sql: ${SPRING_DATASOURCE_INIT_SQL:SET search_path TO billing}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: billing
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: billing
    default-schema: billing
    create-schemas: true
  mail:
    # AWS SES SMTP (또는 다른 SMTP). 시크릿은 env 주입.
    host: ${MAIL_HOST:email-smtp.ap-northeast-2.amazonaws.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

# 메일 헬스체크 비활성 — SMTP(SES) 미설정/더미일 때 actuator mail 인디케이터가 접속 실패로
# /actuator/health 를 DOWN 시키는 것 방지. 실제 발송 여부는 app.mail.smtp-enabled 가 제어.
management:
  health:
    mail:
      enabled: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  billing:
    retry-days: [1, 3, 5]
  webhook:
    secret: ${WEBHOOK_SECRET}
    timeout-ms: 3000
    max-attempts: 5
  portone:
    enabled: ${PORTONE_ENABLED:true}
    api-base: "https://api.portone.io"
    store-id: ${PORTONE_STORE_ID}
    channel-key: ${PORTONE_CHANNEL_KEY}
    api-secret: ${PORTONE_API_SECRET}
    identity-channel-key: ${PORTONE_IDENTITY_CHANNEL_KEY:}
    # PG 웹훅 서명검증 시크릿(필수 — 없으면 웹훅 거부)
    webhook-secret: ${PORTONE_WEBHOOK_SECRET}
  internal:
    # /internal 보호 시크릿 — 디폴트 금지(필수)
    secret: ${INTERNAL_SECRET}
  entitlement:
    # 제품→빌링 서비스 키 — 디폴트 금지(필수)
    api-key: ${SERVICE_API_KEY}
  business:
    # 국세청 진위확인/상태조회 키(권장 — 없으면 자동검증 skip, 서류심사로만)
    api-key: ${BUSINESS_API_KEY:}
  storage:
    # 운영은 S3(사업자등록증 등). 자격증명은 인스턴스 롤/AWS_* env(DefaultCredentialsProvider).
    # bucket/region은 s3.env 공유(office와 동일 버킷), prefix는 app 고정 네임스페이스(공유 s3.env의 AWS_S3_PREFIX 충돌 방지).
    s3:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION}
      prefix: synub-app
  mail:
    from: ${MAIL_FROM:no-reply@synub.io}
    app-base-url: ${APP_BASE_URL}
    smtp-enabled: ${MAIL_SMTP_ENABLED:true}
  sso:
    # 운영: SSO 공개키(JWKS) 서명검증. issuer/jwks-uri는 시크릿 아님 → accounts.synub.io 기본값(env로 override).
    # dev-fallback 반드시 off(토큰 필수).
    mode: ${SSO_MODE:jwks}
    jwt-secret: ${SSO_JWT_SECRET:}
    jwks-uri: ${SSO_JWKS_URL:https://accounts.synub.io/.well-known/jwks.json}
    issuer: ${SSO_ISSUER:https://accounts.synub.io}
    audience: ${SSO_AUDIENCE:synub-billing}
    clock-skew-seconds: ${SSO_CLOCK_SKEW:60}
    dev-fallback-enabled: ${SSO_DEV_FALLBACK:false}
    dev-external-id: ""
    dev-email: ""

billing:
  scheduler:
    cron: ${BILLING_CRON:0 0 3 * * *}
    zone: "Asia/Seoul"
